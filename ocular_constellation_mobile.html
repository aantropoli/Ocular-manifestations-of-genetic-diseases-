<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Ocular Manifestations — Mobile</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: #0a0e1a;
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  overflow: hidden;
  width: 100vw; height: 100vh;
  touch-action: none;
}

#scene {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  transform-origin: 0 0;
  will-change: transform;
}

canvas { position: absolute; top: 0; left: 0; pointer-events: none; }

/* ── Node labels ── */
.node-label {
  position: absolute;
  transform: translate(-50%, -50%);
  text-align: center;
  transition: opacity 0.3s ease;
  user-select: none;
  cursor: pointer;
}
.node-dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  margin: 0 auto 6px;
  transition: all 0.3s ease;
}
/* invisible tap area */
.node-label::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 52px; height: 52px;
  border-radius: 50%;
}
.node-text {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.02em;
  line-height: 1.25;
  white-space: nowrap;
  transition: all 0.3s ease;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}

.node-label.dim .node-dot  { background: #4a5278; }
.node-label.dim .node-text { color: #7a84aa; }

.node-label.connector .node-dot  { background: #374060; border: 1.5px dashed #5a6490; }
.node-label.connector .node-text { color: #6070a0; font-style: italic; font-size: 10px; }
.node-label.connector.active-link .node-dot  { background: #2a3060; border: 1.5px dashed #8899cc; }
.node-label.connector.active-link .node-text { color: #9aaad0; }

.node-label.active-A .node-dot  { background: #a78bfa; box-shadow: 0 0 20px 6px #7c3aed66; }
.node-label.active-A .node-text { color: #c4b5fd; }
.node-label.active-B .node-dot  { background: #34d399; box-shadow: 0 0 20px 6px #05966988; }
.node-label.active-B .node-text { color: #6ee7b7; }
.node-label.active-C .node-dot  { background: #fbbf24; box-shadow: 0 0 20px 6px #d9770688; }
.node-label.active-C .node-text { color: #fde68a; }
.node-label.active-D .node-dot  { background: #60a5fa; box-shadow: 0 0 20px 6px #2563eb88; }
.node-label.active-D .node-text { color: #bfdbfe; }
.node-label.linked .node-dot  { background: #5060a0; box-shadow: 0 0 10px 3px rgba(130,150,220,0.3); }
.node-label.linked .node-text { color: #9aaad0; }

/* ── Top bar ── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: env(safe-area-inset-top, 12px) 16px 10px;
  padding-top: max(env(safe-area-inset-top), 12px);
  background: linear-gradient(to bottom, rgba(10,14,26,0.95) 70%, transparent);
  display: flex; align-items: center; justify-content: space-between;
  pointer-events: none;
}
#topbar-title {
  font-size: 11px; font-weight: 500;
  color: rgba(255,255,255,0.22);
  letter-spacing: 0.08em; text-transform: uppercase;
}
#reset-btn {
  font-size: 11px; color: #4a5a80;
  background: rgba(255,255,255,0.06);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 14px; padding: 5px 12px;
  pointer-events: all; cursor: pointer;
}

/* ── Legend pills ── */
#legend {
  position: fixed; top: max(env(safe-area-inset-top), 12px);
  left: 50%; transform: translateX(-50%);
  z-index: 100; pointer-events: none;
  display: flex; flex-wrap: wrap; gap: 6px;
  justify-content: center;
  padding: 0 60px;
  margin-top: 36px;
}
.leg {
  display: flex; align-items: center; gap: 4px;
  font-size: 9px; color: rgba(255,255,255,0.30);
  letter-spacing: 0.02em;
}
.leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ── Links toggle ── */
#links-btn {
  position: fixed; bottom: 24px; right: 16px;
  z-index: 200;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.07);
  border: 0.5px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  bottom: max(24px, env(safe-area-inset-bottom));
}
#links-btn.on {
  background: rgba(124,58,237,0.25);
  border-color: rgba(167,139,250,0.5);
}

/* ── Bottom sheet card ── */
#sheet-backdrop {
  position: fixed; inset: 0; z-index: 150;
  background: rgba(0,0,0,0);
  pointer-events: none;
  transition: background 0.3s;
}
#sheet-backdrop.open { pointer-events: all; }

#sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: #0d1122;
  border-top: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 20px 20px 0 0;
  padding: 0 20px 20px;
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  transform: translateY(100%);
  transition: transform 0.38s cubic-bezier(0.32,0.72,0,1);
  max-height: 75vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#sheet.open { transform: translateY(0); }

#sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.15);
  margin: 12px auto 16px;
}

#sheet-name {
  font-size: 17px; font-weight: 600; color: #f1f5f9;
  margin-bottom: 4px;
}
#sheet-tag {
  display: inline-block;
  font-size: 9.5px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 2px 9px; border-radius: 10px;
  margin-bottom: 14px;
}
.srow { margin-bottom: 10px; }
.srow .sl { font-size: 9.5px; color: #3d4a6a; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2px; }
.srow .sv { font-size: 13px; color: #b0bcd8; line-height: 1.45; }

#sheet-links { margin-top: 12px; border-top: 0.5px solid rgba(255,255,255,0.07); padding-top: 12px; }
.lrow { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.lpill {
  font-size: 9px; font-weight: 600; letter-spacing: 0.04em;
  text-transform: uppercase; padding: 2px 7px; border-radius: 8px;
  white-space: nowrap; flex-shrink: 0; margin-top: 2px;
}
.ltgt { font-size: 11.5px; color: #5060a0; line-height: 1.45; }
.ltgt strong { color: #7888b8; font-weight: 500; }
.lnote { font-size: 10.5px; color: #3a4870; margin-top: 2px; font-style: italic; }

#sheet-note {
  font-size: 11px; color: #3d4a6a; margin-top: 12px;
  border-top: 0.5px solid rgba(255,255,255,0.05);
  padding-top: 10px; font-style: italic; line-height: 1.5;
}

/* ── Theme legend (bottom left) ── */
#theme-leg {
  position: fixed; bottom: 28px; left: 16px;
  z-index: 100; display: none; flex-direction: column; gap: 5px;
  pointer-events: none;
  bottom: max(28px, env(safe-area-inset-bottom));
}
#theme-leg.visible { display: flex; }
.tleg { display: flex; align-items: center; gap: 5px; font-size: 9px; color: rgba(255,255,255,0.30); }
.tleg-line { width: 18px; height: 2px; border-radius: 1px; flex-shrink: 0; }
</style>
</head>
<body>

<div id="topbar">
  <div id="topbar-title">Ocular · Genetic disease</div>
  <button id="reset-btn" onclick="resetAll()">Reset</button>
</div>

<div id="legend">
  <div class="leg"><div class="leg-dot" style="background:#a78bfa"></div>Eye dominant</div>
  <div class="leg"><div class="leg-dot" style="background:#34d399"></div>Co-equal</div>
  <div class="leg"><div class="leg-dot" style="background:#fbbf24"></div>By referral</div>
  <div class="leg"><div class="leg-dot" style="background:#60a5fa"></div>Systemic-first</div>
</div>

<div id="scene">
  <canvas id="stars"></canvas>
  <canvas id="lines"></canvas>
  <canvas id="tlines"></canvas>
  <div id="nodes"></div>
</div>

<button id="links-btn" onclick="toggleLinks()" title="Toggle all thematic links">⬡</button>

<div id="sheet-backdrop" onclick="closeSheet()"></div>
<div id="sheet">
  <div id="sheet-handle"></div>
  <div id="sheet-name"></div>
  <span id="sheet-tag"></span>
  <div id="sheet-body"></div>
  <div id="sheet-links"></div>
  <div id="sheet-note"></div>
</div>

<div id="theme-leg"></div>

<script>
// ── Themes ────────────────────────────────────────────────────
const THEMES = {
  metabolic:   { label:'Metabolic',       color:'#f472b6', dash:[6,3] },
  blood:       { label:'Haematological',  color:'#fb923c', dash:[4,4] },
  autoinflamm: { label:'Autoinflammation',color:'#f87171', dash:[8,3] },
  mito:        { label:'Mitochondrial',   color:'#facc15', dash:[5,3] },
  ciliopathy:  { label:'Ciliopathy',      color:'#38bdf8', dash:[3,3] },
  tumour:      { label:'Tumour suppressor',color:'#4ade80',dash:[7,3] },
};

// ── Diseases ─────────────────────────────────────────────────
// cx/cy are in the SCENE coordinate space (1400×900 virtual canvas)
const SW = 1400, SH = 900;

const diseases = [
  { id:'usher',  name:'Usher syndrome',      cluster:'A', cx:0.06, cy:0.30, connector:false,
    eye:'Photoreceptors (RP)', disc:'Ophtho – ENT', concern:'Primarily ophtho', gene:'MYO7A, USH2A, CLRN1 (AR)',
    links:[{theme:'ciliopathy',targets:['bbs','nphp'],note:'Ciliopathy spectrum: photoreceptor outer segment renewal requires intact ciliary trafficking'}],
    note:'RP drives adult disability. Cochlear implant planning must account for visual prognosis.' },
  { id:'pxe',    name:'PXE',                 cluster:'A', cx:0.12, cy:0.18, connector:false,
    eye:'Angioid streaks / CNV', disc:'Ophtho – dermato', concern:'Primarily ophtho', gene:'ABCC6 (AR)',
    links:[{theme:'metabolic',targets:['gyrate','hemo'],note:'Abnormal circulating molecules damage Bruch\'s membrane: mineralisation (PXE), iron overload (hemochromatosis), ornithine (gyrate)'}],
    note:'Anti-VEGF for CNV. Visual morbidity dominates the patient\'s disability.' },
  { id:'gyrate', name:'Gyrate atrophy',      cluster:'A', cx:0.08, cy:0.46, connector:false,
    eye:'Photoreceptors', disc:'Other specialist', concern:'Primarily ophtho', gene:'OAT (AR)',
    links:[{theme:'metabolic',targets:['pxe','hemo'],note:'Excess ornithine (gyrate), iron (hemochromatosis), mineralisation (PXE) all damage ocular structures via metabolite accumulation'}],
    note:'Low-arginine diet reduces plasma ornithine. Ophthalmologist drives management.' },
  { id:'rosah',  name:'ROSAH',               cluster:'A', cx:0.20, cy:0.38, connector:false,
    eye:'Photoreceptors + uveitis', disc:'Ophtho > other', concern:'Other specialist', gene:'ALPK1 (AD)',
    links:[{theme:'autoinflamm',targets:['blau','vexas','tlr7'],note:'ALPK1 (ROSAH), NOD2 (Blau), UBA1 (VEXAS), TLR7 — all activate innate immune/NF-κB pathways'}],
    note:'Newly described 2019. Ophtho discovers, but systemic autoinflammation needs co-management.' },
  { id:'chm',    name:'CHM syndromic del.',  cluster:'A', cx:0.16, cy:0.62, connector:false,
    eye:'Photoreceptors (choroideremia)', disc:'Other specialist', concern:'Co-equal', gene:'CHM + Xq21 del. (XL)',
    links:[{theme:'ciliopathy',targets:['usher','bbs'],note:'CHM (REP1) involved in vesicular trafficking shared with ciliary processes in photoreceptors'}],
    note:'Isolated CHM = ophtho-led. Syndromic deletion (ID, deafness) shifts to genetics-led.' },
  { id:'coq2',   name:'COQ2',               cluster:'A', cx:0.24, cy:0.70, connector:false,
    eye:'Photoreceptors (cone-rod)', disc:'Other specialist', concern:'Co-equal', gene:'COQ2 (AR)',
    links:[{theme:'mito',targets:['ks','midd'],note:'COQ2, KS, and MIDD/MELAS all cause retinal dystrophy via mitochondrial dysfunction in RPE/photoreceptors'}],
    note:'Retinal dystrophy often found after renal transplant. Oral CoQ10 may slow progression.' },
  { id:'bbs',    name:'Bardet-Biedl',        cluster:'B', cx:0.32, cy:0.14, connector:false,
    eye:'Photoreceptors (RP)', disc:'Other specialist', concern:'Co-equal', gene:'BBS1–21 (BBSome, AR)',
    links:[{theme:'ciliopathy',targets:['usher','nphp','cohen'],note:'BBS, Usher, NPHP, Cohen — all ciliopathies affecting photoreceptor outer segment renewal'}],
    note:'RP is often the first symptom. Polydactyly + night blindness = BBS until proved otherwise.' },
  { id:'midd',   name:'MIDD / MELAS',        cluster:'B', cx:0.38, cy:0.26, connector:false,
    eye:'Macular dystrophy', disc:'Ophtho > other', concern:'Co-equal', gene:'mtDNA m.3243A>G',
    links:[{theme:'mito',targets:['ks','coq2'],note:'MIDD/MELAS, KS, COQ2 all impair mitochondrial oxidative phosphorylation — RPE and photoreceptors are exquisitely sensitive to energy failure'}],
    note:'FAF perifoveal pattern is pathognomonic — ophthalmologist can trigger mtDNA testing.' },
  { id:'ks',     name:'Kearns-Sayre',        cluster:'B', cx:0.30, cy:0.38, connector:false,
    eye:'Photoreceptors + CPEO', disc:'Other specialist', concern:'Co-equal', gene:'mtDNA large deletion (sporadic)',
    links:[{theme:'mito',targets:['midd','coq2'],note:'Large mtDNA deletion (KS), point mutation m.3243A>G (MIDD), CoQ10 defect (COQ2) share mitochondrial photoreceptor/RPE failure'}],
    note:'ECG mandatory — cardiac conduction defects can cause sudden death.' },
  { id:'vhl',    name:'VHL',                 cluster:'B', cx:0.40, cy:0.48, connector:false,
    eye:'Hemangioblastomas', disc:'Co-equal', concern:'Co-equal', gene:'VHL (AD, tumour suppressor)',
    links:[{theme:'tumour',targets:['nf1'],note:'VHL and NF1: both tumour suppressor phakomatoses with characteristic ocular findings as diagnostic/surveillance targets'}],
    note:'Retinal hemangioblastoma often the earliest manifestation. Annual surveillance: ophtho + MRI + abdominal.' },
  { id:'cohen',  name:'Cohen syndrome',      cluster:'B', cx:0.34, cy:0.60, connector:false,
    eye:'Photoreceptors (RP-like)', disc:'Other specialist', concern:'Co-equal', gene:'VPS13B / COH1 (AR)',
    links:[{theme:'ciliopathy',targets:['bbs','nphp'],note:'VPS13B (Cohen), BBS genes, NPHP1 all affect vesicular/ciliary trafficking essential for photoreceptor outer segment renewal'}],
    note:'Underdiagnosed. RP + high myopia + intellectual disability + neutropenia = Cohen syndrome.' },
  { id:'nphp',   name:'NPHP1',              cluster:'B', cx:0.42, cy:0.70, connector:false,
    eye:'Photoreceptors', disc:'Other specialist', concern:'Co-equal', gene:'NPHP1 (AR)',
    links:[{theme:'ciliopathy',targets:['bbs','usher','cohen'],note:'NPHP1, BBS, Usher, Cohen: ciliopathy spectrum — photoreceptor outer segment renewal requires intact ciliary trafficking in all'}],
    note:'~10% of NPHP have retinal involvement (Senior-Løken). Ophthalmology should be part of NPHP workup.' },
  { id:'nf1',    name:'NF1',                cluster:'C', cx:0.60, cy:0.20, connector:false,
    eye:'Lisch nodules + OPG', disc:'Co-equal', concern:'Other specialist', gene:'NF1 (AD, tumour suppressor)',
    links:[{theme:'tumour',targets:['vhl'],note:'NF1 and VHL: phakomatoses caused by tumour suppressor loss; ocular features are diagnostic criteria and surveillance targets'}],
    note:'Lisch nodules are a diagnostic criterion. Annual ophtho surveillance for OPG in childhood.' },
  { id:'alport', name:'Alport syndrome',    cluster:'C', cx:0.66, cy:0.36, connector:false,
    eye:'Posterior lenticonus + macular', disc:'Other specialist', concern:'Other specialist', gene:'COL4A5/A3/A4',
    links:[{theme:'metabolic',targets:['hemo'],note:'Alport (collagen IV) and hemochromatosis both involve structural/metabolic damage to basement membranes across multiple organs'}],
    note:'Posterior lenticonus is pathognomonic. Slit-lamp can precede renal biopsy.' },
  { id:'sca',    name:'SCA',                cluster:'C', cx:0.72, cy:0.26, connector:false,
    eye:'Photoreceptors (SCA7) + gaze', disc:'Other > ophtho', concern:'Other specialist', gene:'ATXN1/2/3/6/7 (AD)',
    links:[{theme:'mito',targets:['ks'],note:'SCA and Kearns-Sayre both present with progressive ophthalmoplegia + ataxia; overlapping neuro-ophthalmic phenotype'}],
    note:'SCA7 exception: cone-rod dystrophy can precede cerebellar ataxia. Worth separating in teaching.' },
  { id:'vexas',  name:'VEXAS',             cluster:'D', cx:0.80, cy:0.32, connector:false,
    eye:'Secondary (uveitis/scleritis)', disc:'Other specialist', concern:'Haematologist/rheum.', gene:'UBA1 (XL somatic)',
    links:[
      {theme:'blood',targets:['hemo','lupus'],note:'VEXAS, hemochromatosis, monogenic lupus: haematological/bone marrow disease with secondary ocular involvement'},
      {theme:'autoinflamm',targets:['blau','rosah','tlr7'],note:'UBA1 (VEXAS), NOD2 (Blau), ALPK1 (ROSAH), TLR7 — innate immune activation causing inflammatory eye disease'}
    ],
    note:'Man >50, refractory uveitis + macrocytic anaemia + relapsing polychondritis → think VEXAS.' },
  { id:'lupus',  name:'Monogenic lupus',   cluster:'D', cx:0.88, cy:0.46, connector:false,
    eye:'Secondary (inflammatory)', disc:'Other specialist', concern:'Other specialist', gene:'C1Q, TREX1, DNASE1L3 etc.',
    links:[
      {theme:'blood',targets:['vexas','hemo'],note:'Systemic haematological/immune disorder with secondary eye involvement in all three'},
      {theme:'autoinflamm',targets:['blau','tlr7'],note:'Monogenic lupus, TLR7 GOF, and Blau: monogenic autoinflammatory/autoimmune diseases with uveitis'}
    ],
    note:'Consider in paediatric-onset lupus. WES/WGS needed for molecular diagnosis.' },
  { id:'blau',   name:'Blau syndrome',     cluster:'D', cx:0.84, cy:0.62, connector:false,
    eye:'Secondary (granulomatous uveitis)', disc:'Other > ophtho', concern:'Other specialist', gene:'NOD2 (AD)',
    links:[{theme:'autoinflamm',targets:['rosah','vexas','tlr7'],note:'NOD2 (Blau), ALPK1 (ROSAH), UBA1 (VEXAS), TLR7: innate immune activation → granulomatous or neutrophilic uveitis'}],
    note:'Distinguish from sarcoidosis (NOD2-negative). Granulomatous panuveitis can be the most vision-threatening feature.' },
  // connectors
  { id:'hemo',   name:'Hemochromatosis',   cluster:'_', cx:0.50, cy:0.54, connector:true,
    eye:'Angioid streaks (iron overload)', disc:'Haematologist/hepatologist', concern:'Systemic (iron overload)', gene:'HFE (AR)',
    links:[
      {theme:'metabolic',targets:['pxe','gyrate'],note:'Angioid streaks in hemochromatosis, PXE, gyrate atrophy: structural weakness of Bruch\'s membrane from different metabolic insults'},
      {theme:'blood',targets:['vexas','lupus'],note:'Hemochromatosis, VEXAS, monogenic lupus: bone marrow/haematological dysfunction with downstream ocular effects'}
    ],
    note:'Connector node — linked to PXE, gyrate atrophy, VEXAS, and monogenic lupus.' },
  { id:'tlr7',   name:'TLR7 GOF',          cluster:'_', cx:0.72, cy:0.60, connector:true,
    eye:'Secondary (uveitis)', disc:'Rheumatologist', concern:'Systemic autoimmunity', gene:'TLR7 (XL, GOF)',
    links:[{theme:'autoinflamm',targets:['blau','vexas','rosah','lupus'],note:'TLR7 GOF, NOD2 (Blau), ALPK1 (ROSAH), UBA1 (VEXAS) converge on innate immune hyperactivation causing inflammatory uveitis'}],
    note:'Connector node — TLR7 gain-of-function interferonopathy; uveitis links it to Blau, ROSAH, VEXAS, monogenic lupus.' },
];

const clusterMeta = {
  A:{ name:'Eye dominant / ophtho leads', color:'#a78bfa', bg:'rgba(124,58,237,0.15)', border:'rgba(167,139,250,0.3)' },
  B:{ name:'Co-equal',                   color:'#34d399', bg:'rgba(5,150,105,0.15)',   border:'rgba(52,211,153,0.3)' },
  C:{ name:'Ophtho by referral',         color:'#fbbf24', bg:'rgba(217,119,6,0.15)',   border:'rgba(251,191,36,0.3)' },
  D:{ name:'Systemic-first',             color:'#60a5fa', bg:'rgba(37,99,235,0.15)',   border:'rgba(96,165,250,0.3)' },
  _:{ name:'Connector node',             color:'#8090c0', bg:'rgba(80,100,160,0.1)',   border:'rgba(120,140,200,0.2)' },
};

// ── Canvas / scene ───────────────────────────────────────────
const scene     = document.getElementById('scene');
const starC     = document.getElementById('stars');
const lineC     = document.getElementById('lines');
const tlineC    = document.getElementById('tlines');
const sl        = starC.getContext('2d');
const ll        = lineC.getContext('2d');
const tl        = tlineC.getContext('2d');

// Virtual scene size (fixed, we pan/zoom into it)
const SCENE_W = 1400, SCENE_H = 900;

function setupCanvases() {
  [starC, lineC, tlineC].forEach(c => { c.width = SCENE_W; c.height = SCENE_H; });
  scene.style.width  = SCENE_W + 'px';
  scene.style.height = SCENE_H + 'px';
}

function drawStars() {
  sl.clearRect(0,0,SCENE_W,SCENE_H);
  for (let i=0;i<320;i++){
    sl.beginPath();
    sl.arc(Math.random()*SCENE_W, Math.random()*SCENE_H, Math.random()*1.4+0.2, 0, Math.PI*2);
    sl.fillStyle=`rgba(255,255,255,${Math.random()*0.28+0.05})`; sl.fill();
  }
  // divider
  ll.strokeStyle='rgba(255,255,255,0.07)'; ll.lineWidth=0.5;
  ll.setLineDash([4,8]);
  ll.beginPath(); ll.moveTo(SCENE_W*0.50,60); ll.lineTo(SCENE_W*0.50,SCENE_H-60); ll.stroke();
  ll.setLineDash([]);
}

function nx(d){ return d.cx * SCENE_W; }
function ny(d){ return d.cy * SCENE_H; }

function drawClusterLines(activeCluster) {
  ll.clearRect(0,0,SCENE_W,SCENE_H);
  ll.strokeStyle='rgba(255,255,255,0.07)'; ll.lineWidth=0.5;
  ll.setLineDash([4,8]);
  ll.beginPath(); ll.moveTo(SCENE_W*0.50,60); ll.lineTo(SCENE_W*0.50,SCENE_H-60); ll.stroke();
  ll.setLineDash([]);
  ['A','B','C','D'].forEach(cl=>{
    const members=diseases.filter(d=>d.cluster===cl&&!d.connector);
    const col={A:'#7c3aed',B:'#059669',C:'#d97706',D:'#2563eb'}[cl];
    const focused=activeCluster===null||activeCluster===cl;
    ll.strokeStyle=col+Math.round((focused?0.20:0.04)*255).toString(16).padStart(2,'0');
    ll.lineWidth=focused?1.0:0.5; ll.setLineDash([]);
    members.forEach(d=>{
      members.filter(o=>o.id!==d.id)
        .map(o=>({o,dist:Math.hypot(nx(o)-nx(d),ny(o)-ny(d))}))
        .sort((a,b)=>a.dist-b.dist).slice(0,2)
        .forEach(({o})=>{ ll.beginPath(); ll.moveTo(nx(d),ny(d)); ll.lineTo(nx(o),ny(o)); ll.stroke(); });
    });
  });
}

function drawThematicLines(activeId, showAll) {
  tl.clearRect(0,0,SCENE_W,SCENE_H);
  const byId={}; diseases.forEach(d=>byId[d.id]=d);
  const drawn=new Set();
  diseases.forEach(src=>{
    if (!src.links) return;
    const isActive=src.id===activeId;
    if (!showAll&&!isActive) return;
    src.links.forEach(lk=>{
      const theme=THEMES[lk.theme]; if(!theme) return;
      lk.targets.forEach(tid=>{
        const tgt=byId[tid]; if(!tgt) return;
        const key=[src.id,tid].sort().join('|')+lk.theme;
        if(drawn.has(key)) return; drawn.add(key);
        const alpha=showAll?0.35:(isActive?0.70:0.10);
        tl.strokeStyle=theme.color+Math.round(alpha*255).toString(16).padStart(2,'0');
        tl.lineWidth=isActive?2.0:1.0;
        tl.setLineDash(theme.dash);
        tl.beginPath(); tl.moveTo(nx(src),ny(src));
        const mx=(nx(src)+nx(tgt))/2, my=(ny(src)+ny(tgt))/2-24;
        tl.quadraticCurveTo(mx,my,nx(tgt),ny(tgt));
        tl.stroke(); tl.setLineDash([]);
      });
    });
  });
}

// ── Pan / Zoom ────────────────────────────────────────────────
let panX=0, panY=0, zoom=1;
let isPanning=false, pinching=false;
let lastTouchX=0, lastTouchY=0;
let lastPinchDist=0;
let startPanX=0, startPanY=0, startTouchX=0, startTouchY=0;

function clampPan(x, y, z) {
  const vw=window.innerWidth, vh=window.innerHeight;
  const sw=SCENE_W*z, sh=SCENE_H*z;
  const minX=Math.min(0, vw-sw);
  const minY=Math.min(0, vh-sh);
  return { x: Math.max(minX, Math.min(0, x)), y: Math.max(minY, Math.min(0, y)) };
}

function applyTransform() {
  scene.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
}

function fitToScreen() {
  const vw=window.innerWidth, vh=window.innerHeight;
  zoom=Math.min(vw/SCENE_W, vh/SCENE_H);
  const clamped=clampPan((vw-SCENE_W*zoom)/2, (vh-SCENE_H*zoom)/2, zoom);
  panX=clamped.x; panY=clamped.y;
  applyTransform();
}

// touch events on scene
scene.addEventListener('touchstart', onTouchStart, {passive:false});
scene.addEventListener('touchmove',  onTouchMove,  {passive:false});
scene.addEventListener('touchend',   onTouchEnd,   {passive:false});

function onTouchStart(e) {
  if (e.touches.length===1) {
    isPanning=true; pinching=false;
    lastTouchX=e.touches[0].clientX;
    lastTouchY=e.touches[0].clientY;
    startPanX=panX; startPanY=panY;
    startTouchX=e.touches[0].clientX;
    startTouchY=e.touches[0].clientY;
  } else if (e.touches.length===2) {
    isPanning=false; pinching=true;
    lastPinchDist=Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );
    e.preventDefault();
  }
}

function onTouchMove(e) {
  e.preventDefault();
  if (pinching && e.touches.length===2) {
    const dist=Math.hypot(
      e.touches[0].clientX-e.touches[1].clientX,
      e.touches[0].clientY-e.touches[1].clientY
    );
    const delta=dist/lastPinchDist;
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    const newZoom=Math.max(0.4, Math.min(3.0, zoom*delta));
    panX=cx-(cx-panX)*(newZoom/zoom);
    panY=cy-(cy-panY)*(newZoom/zoom);
    zoom=newZoom;
    const c=clampPan(panX,panY,zoom); panX=c.x; panY=c.y;
    applyTransform();
    lastPinchDist=dist;
  } else if (isPanning && e.touches.length===1) {
    const dx=e.touches[0].clientX-lastTouchX;
    const dy=e.touches[0].clientY-lastTouchY;
    const c=clampPan(panX+dx, panY+dy, zoom); panX=c.x; panY=c.y;
    applyTransform();
    lastTouchX=e.touches[0].clientX;
    lastTouchY=e.touches[0].clientY;
  }
}

function onTouchEnd(e) {
  if (e.touches.length===0) {
    // was this a tap (not a drag)?
    if (isPanning) {
      const dx=Math.abs((e.changedTouches[0]?.clientX||0)-startTouchX);
      const dy=Math.abs((e.changedTouches[0]?.clientY||0)-startTouchY);
      // taps handled by node click listeners
    }
    isPanning=false; pinching=false;
  } else if (e.touches.length===1) {
    pinching=false; isPanning=true;
    lastTouchX=e.touches[0].clientX;
    lastTouchY=e.touches[0].clientY;
  }
}

// ── Nodes ─────────────────────────────────────────────────────
let activeNode=null;
let linkModeOn=false;

function buildNodes() {
  const container=document.getElementById('nodes');
  container.innerHTML='';
  diseases.forEach(d=>{
    const el=document.createElement('div');
    el.className='node-label dim'+(d.connector?' connector':'');
    el.id='node-'+d.id;
    el.style.left=(d.cx*SCENE_W)+'px';
    el.style.top =(d.cy*SCENE_H)+'px';
    el.innerHTML=`<div class="node-dot"></div><div class="node-text">${d.name}</div>`;
    el.addEventListener('click', ev=>{ ev.stopPropagation(); activateNode(d); });
    container.appendChild(el);
  });
}

function getLinkedIds(d) {
  const s=new Set();
  (d.links||[]).forEach(lk=>lk.targets.forEach(t=>s.add(t)));
  return s;
}

function activateNode(d) {
  if (activeNode&&activeNode.id===d.id) { resetAll(); return; }
  diseases.forEach(x=>{
    document.getElementById('node-'+x.id).className='node-label dim'+(x.connector?' connector':'');
  });
  const el=document.getElementById('node-'+d.id);
  el.className='node-label active-'+(d.connector?'A':d.cluster)+(d.connector?' connector':'');
  activeNode=d;
  const linked=getLinkedIds(d);
  linked.forEach(tid=>{
    const tel=document.getElementById('node-'+tid); if(!tel)return;
    const td=diseases.find(x=>x.id===tid);
    tel.className='node-label linked'+(td&&td.connector?' connector':'');
  });
  drawClusterLines(d.connector?null:d.cluster);
  drawThematicLines(d.id, linkModeOn);
  openSheet(d);
  updateThemeLeg(d, linkModeOn);
}

function toggleLinks() {
  linkModeOn=!linkModeOn;
  document.getElementById('links-btn').classList.toggle('on', linkModeOn);
  drawThematicLines(activeNode?activeNode.id:null, linkModeOn);
  updateThemeLeg(activeNode, linkModeOn);
}

function updateThemeLeg(d, showAll) {
  const leg=document.getElementById('theme-leg');
  const used=new Set();
  if (showAll) diseases.forEach(x=>(x.links||[]).forEach(lk=>used.add(lk.theme)));
  else if (d) (d.links||[]).forEach(lk=>used.add(lk.theme));
  if (!used.size) { leg.classList.remove('visible'); return; }
  leg.innerHTML='';
  used.forEach(k=>{ const t=THEMES[k];if(!t)return;
    const r=document.createElement('div'); r.className='tleg';
    r.innerHTML=`<div class="tleg-line" style="background:${t.color}"></div><span>${t.label}</span>`;
    leg.appendChild(r);
  });
  leg.classList.add('visible');
}

function openSheet(d) {
  const meta=clusterMeta[d.cluster]||clusterMeta['_'];
  const byId={}; diseases.forEach(x=>byId[x.id]=x);
  document.getElementById('sheet-name').textContent=d.name;
  const tag=document.getElementById('sheet-tag');
  tag.textContent=meta.name;
  tag.style.background=meta.bg; tag.style.border='0.5px solid '+meta.border; tag.style.color=meta.color;
  document.getElementById('sheet-body').innerHTML=`
    <div class="srow"><div class="sl">Eye involvement</div><div class="sv">${d.eye}</div></div>
    <div class="srow"><div class="sl">Discovery</div><div class="sv">${d.disc}</div></div>
    <div class="srow"><div class="sl">Main concern</div><div class="sv">${d.concern}</div></div>
    <div class="srow"><div class="sl">Gene / inheritance</div><div class="sv">${d.gene}</div></div>
  `;
  const linksEl=document.getElementById('sheet-links');
  if (d.links&&d.links.length) {
    linksEl.innerHTML=(d.links||[]).map(lk=>{
      const t=THEMES[lk.theme];if(!t)return'';
      const names=lk.targets.map(tid=>byId[tid]?`<strong>${byId[tid].name}</strong>`:tid).join(', ');
      return `<div class="lrow">
        <span class="lpill" style="background:${t.color}22;border:0.5px solid ${t.color}55;color:${t.color}">${t.label}</span>
        <div><div class="ltgt">→ ${names}</div><div class="lnote">${lk.note}</div></div>
      </div>`;
    }).join('');
    linksEl.style.display='block';
  } else { linksEl.innerHTML=''; linksEl.style.display='none'; }
  document.getElementById('sheet-note').textContent=d.note;
  document.getElementById('sheet').classList.add('open');
  document.getElementById('sheet-backdrop').classList.add('open');
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('sheet-backdrop').classList.remove('open');
}

function resetAll() {
  diseases.forEach(x=>{
    document.getElementById('node-'+x.id).className='node-label dim'+(x.connector?' connector':'');
  });
  closeSheet();
  activeNode=null;
  drawClusterLines(null);
  drawThematicLines(null, linkModeOn);
  updateThemeLeg(null, linkModeOn);
}

// ── Init ──────────────────────────────────────────────────────
function init() {
  setupCanvases();
  drawStars();
  drawClusterLines(null);
  drawThematicLines(null, false);
  buildNodes();
  fitToScreen();
}

window.addEventListener('resize', ()=>{ fitToScreen(); });
init();
</script>
